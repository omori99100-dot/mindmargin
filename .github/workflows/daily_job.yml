name: MindMargin Daily Job

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Ollama & pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull qwen2.5:0.5b
          echo "Ollama ready"

      - name: Install Piper TTS
        run: |
          curl -sL https://github.com/rhasspy/piper/releases/download/v1.2.0/piper_amd64.tar.gz -o /tmp/piper.tar.gz
          sudo mkdir -p /usr/local/lib/piper
          sudo tar -xzf /tmp/piper.tar.gz -C /usr/local/lib/piper
          sudo ln -sf /usr/local/lib/piper/piper /usr/local/bin/piper
          sudo mkdir -p /usr/local/lib/piper/voices
          curl -sL https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/lessac/medium/en_US-lessac-medium.onnx \
            -o /usr/local/lib/piper/voices/en_US-lessac-medium.onnx
          curl -sL https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/lessac/medium/en_US-lessac-medium.onnx.json \
            -o /usr/local/lib/piper/voices/en_US-lessac-medium.onnx.json
          sed -i 's|binary: .*|binary: /usr/local/bin/piper|' config/settings.yaml
          sed -i 's|model_path: .*|model_path: /usr/local/lib/piper/voices/en_US-lessac-medium.onnx|' config/settings.yaml
          echo "Piper ready"

      - name: Create output directories
        run: |
          mkdir -p output
          echo "output/ created"

      - name: Restore database cache
        uses: actions/cache/restore@v4
        id: cache-db
        with:
          path: data/mindmargin.db
          key: mindmargin-db-${{ github.run_id }}
          restore-keys: |
            mindmargin-db-

      - name: Restore secrets
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "${{ secrets.CLIENT_SECRETS }}" > client_secrets.json

      - name: Seed database with published videos
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/seed_db.py

      - name: Run daily job
        env:
          PYTHONIOENCODING: utf-8
        run: python -m mindmargin.main --run-daily-job

      - name: Save database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/mindmargin.db
          key: mindmargin-db-${{ github.run_id }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ MindMargin daily job FAILED — check GitHub Actions"
