name: MindMargin Daily Job

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

concurrency:
  group: daily-job
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify Node.js
        run: node -v

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg ca-certificates
          sudo update-ca-certificates --fresh

      - name: Install Ollama & pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull qwen2.5:0.5b
          echo "Ollama ready"

      - name: Install Piper TTS
        run: |
          wget -q "https://github.com/rhasspy/piper/releases/download/v1.2.0/piper_amd64.tar.gz" -O piper.tar.gz
          sudo mkdir -p /usr/local/lib/piper
          sudo tar -xzf piper.tar.gz -C /usr/local/lib/piper
          sudo ln -sf /usr/local/lib/piper/piper/piper /usr/local/bin/piper
          sudo mkdir -p /usr/local/lib/piper/voices
          sudo chmod 777 /usr/local/lib/piper/voices
          wget -q "https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/lessac/medium/en_US-lessac-medium.onnx" -O /usr/local/lib/piper/voices/en_US-lessac-medium.onnx
          wget -q "https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/lessac/medium/en_US-lessac-medium.onnx.json" -O /usr/local/lib/piper/voices/en_US-lessac-medium.onnx.json
          sed -i 's|binary: .*|binary: /usr/local/bin/piper|' config/settings.yaml
          sed -i 's|model_path: .*|model_path: /usr/local/lib/piper/voices/en_US-lessac-medium.onnx|' config/settings.yaml
          piper --version && echo "Piper ready"

      - name: Create output directories
        run: |
          mkdir -p output data
          echo "Directories created"

      - name: Restore database cache
        uses: actions/cache/restore@v4
        id: cache-db
        with:
          path: data/mindmargin.db
          key: mindmargin-db-${{ github.run_id }}
          restore-keys: mindmargin-db-

      - name: Validate required secrets
        run: |
          ERRORS=0
          if [ -z "${{ secrets.YOUTUBE_TOKEN_B64 }}" ]; then
            echo "❌ MISSING SECRET: YOUTUBE_TOKEN_B64"
            ERRORS=$((ERRORS + 1))
          fi
          if [ -z "${{ secrets.ENV_FILE }}" ]; then
            echo "❌ MISSING SECRET: ENV_FILE"
            ERRORS=$((ERRORS + 1))
          fi
          if [ -z "${{ secrets.CLIENT_SECRETS }}" ]; then
            echo "❌ MISSING SECRET: CLIENT_SECRETS"
            ERRORS=$((ERRORS + 1))
          fi
          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "=========================================="
            echo "  REQUIRED SECRETS MISSING"
            echo "=========================================="
            echo ""
            echo "Go to: https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo ""
            echo "Required secrets:"
            echo "  1. YOUTUBE_TOKEN_B64  — base64-encoded youtube_token.pickle"
            echo "  2. ENV_FILE           — contents of .env file"
            echo "  3. CLIENT_SECRETS     — contents of client_secrets.json"
            echo ""
            echo "Optional secrets:"
            echo "  4. TELEGRAM_BOT_TOKEN — for failure notifications"
            echo "  5. TELEGRAM_CHAT_ID   — for failure notifications"
            echo ""
            echo "See: GITHUB_SETUP.md for full setup instructions"
            echo "=========================================="
            exit 1
          fi
          echo "✅ All required secrets validated"

      - name: Restore secrets
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "${{ secrets.CLIENT_SECRETS }}" > client_secrets.json

      - name: Seed database
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/seed_db.py

      - name: Run daily job
        env:
          PYTHONIOENCODING: utf-8
        run: python -m mindmargin.main --run-daily-job

      - name: Save database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/mindmargin.db
          key: mindmargin-db-${{ github.run_id }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ MindMargin daily job FAILED — check GitHub Actions"
