name: MindMargin Daily Job

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Ollama & pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama pull qwen2.5:0.5b
          echo "Ollama ready"

      - name: Create output directories
        run: |
          mkdir -p output
          echo "output/ created"

      - name: Restore database cache
        uses: actions/cache/restore@v4
        id: cache-db
        with:
          path: data/mindmargin.db
          key: mindmargin-db-${{ github.run_id }}
          restore-keys: |
            mindmargin-db-

      - name: Restore secrets
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}" | base64 -d > youtube_token.pickle
          echo "${{ secrets.ENV_FILE }}" > .env
          echo "${{ secrets.CLIENT_SECRETS }}" > client_secrets.json

      - name: Seed database with published videos
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/seed_db.py

      - name: Run daily job
        env:
          PYTHONIOENCODING: utf-8
        run: python -m mindmargin.main --run-daily-job

      - name: Save database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/mindmargin.db
          key: mindmargin-db-${{ github.run_id }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ MindMargin daily job FAILED — check GitHub Actions"
