name: MindMargin Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      confirm:
        description: "Type environment name to confirm"
        required: true

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify confirmation
        if: github.event.inputs.confirm != github.event.inputs.environment
        run: |
          echo "❌ Confirmation mismatch. Expected: ${{ github.event.inputs.environment }}, got: ${{ github.event.inputs.confirm }}"
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Run tests before deploy
        run: python -m pytest tests/ -q --tb=short --timeout=60

      - name: Build Docker images
        run: |
          docker build -f deploy/docker/Dockerfile.api -t mindmargin-api:${{ github.event.inputs.environment }} .
          docker build -f deploy/docker/Dockerfile.worker -t mindmargin-worker:${{ github.event.inputs.environment }} .

      - name: Deploy with docker-compose
        run: |
          ENV=${{ github.event.inputs.environment }}
          if [ "$ENV" = "production" ]; then
            docker compose -f deploy/docker/docker-compose.prod.yml up -d --build
          else
            docker compose -f deploy/docker/docker-compose.staging.yml up -d --build
          fi

      - name: Verify deployment
        run: |
          sleep 15
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/health && break
            sleep 3
          done
          echo "✅ Deployment verified"

      - name: Notify
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ MindMargin deployed to ${{ github.event.inputs.environment }}"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ MindMargin deploy to ${{ github.event.inputs.environment }} FAILED"
