environment: development
log_level: INFO
debug: false

llm:
  provider: ollama
  model: qwen2.5:0.5b
  base_url: http://localhost:11434
  temperature: 0.7
  max_tokens: 4096
  timeout: 120

piper:
  binary: C:\Users\A Center\AppData\Local\piper\piper.exe
  voice_model: en_US-lessac-medium
  model_path: C:\Users\A Center\AppData\Local\piper\voices\en_US-lessac-medium\en_US-lessac-medium.onnx
  noise_scale: 0.667
  noise_w: 0.8
  length_scale: 1.0
  sample_rate: 22050

video:
  width: 1920
  height: 1080
  fps: 30
  crf: 18
  preset: medium
  audio_bitrate: 192k

storage:
  output_root: output
  temp_root: output/temp

youtube:
  client_secrets_path: "client_secrets.json"
  token_path: "youtube_token.pickle"
  channel_id: "UC57dAOFJzMDnMrTh6nwPweA"
  default_privacy: private
  default_category: "27"
  upload_retries: 3

redis_url: "redis://localhost:6379/0"
database_url: ""

production:
  max_parallel_jobs: 4
  max_parallel_sections: 4
  enable_background_jobs: true
  enable_structured_logs: true
  enable_cache_hash: true
  enable_health_reports: true
  enable_auto_resume: true
  enable_duplicate_detection: true
  default_encoder: ""
  job_poll_interval: 1.0
