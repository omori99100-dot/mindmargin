version: "3.8"

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      ENVIRONMENT: production
      LOG_LEVEL: WARNING
      DEBUG: "false"
    volumes:
      - ../../output:/app/output
      - ../../data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    environment:
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      ENVIRONMENT: production
      LOG_LEVEL: WARNING
    volumes:
      - ../../output:/app/output
      - ../../data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
    restart: always

volumes:
  redis_data:
  ollama_data:
